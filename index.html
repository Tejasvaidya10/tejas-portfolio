<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tejas Vaidya — Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="variations/editorial.css" />

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #161310; }
  body { font-family: "Inter", system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
  /* The portfolio fills the viewport — internal scroll lives on .ed-root. */
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="variations/editorial.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "light",
  "texture": "clean",
  "accent": "#d97706"
}/*EDITMODE-END*/;

const ACCENT_PRESETS = ["#d97706", "#b91c1c", "#0f766e", "#1d4ed8", "#7c2d12", "#475569"];

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <window.EditorialPortfolio mode={t.mode} texture={t.texture} accent={t.accent} />
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Theme">
          <window.TweakRadio
            label="Mode"
            value={t.mode}
            options={["dark", "light"]}
            onChange={(v) => setTweak("mode", v)}
          />
          <window.TweakRadio
            label="Texture"
            value={t.texture}
            options={["clean", "grid", "noise"]}
            onChange={(v) => setTweak("texture", v)}
          />
        </window.TweakSection>
        <window.TweakSection label="Accent" />
        <window.TweakColor label="Color" value={t.accent} onChange={(v) => setTweak("accent", v)} />
        <div style={{ display: "flex", gap: 6, padding: "0 12px 10px" }}>
          {ACCENT_PRESETS.map((c) => (
            <button
              key={c}
              onClick={() => setTweak("accent", c)}
              aria-label={c}
              style={{
                width: 18, height: 18, borderRadius: "50%",
                background: c, border: "1px solid rgba(0,0,0,0.18)",
                cursor: "pointer", padding: 0
              }}
            />
          ))}
        </div>
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
